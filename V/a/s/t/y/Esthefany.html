<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No lea el titulo :3 XD</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" href="vst.css">
    <link rel="icon" href="bunny.png">
</head>
<body>
    <!-- <audio id="music" controls autoplay src="back.mp3" type="audio/mpeg">
    </audio> -->
    <audio autoplay id="playm">
        <source src="back.mp3">
    </audio>

    <div class="container">
        <img id="bigpic" src="vst.gif" alt="" />
        <img id="back" alt="" />
        <div class="row">
            <div class="centered">
                <h4>Serás mi San Valentín n.n</h4>
                    <input class="no" type="checkbox" name="answer" id="No" />
                        <label class="no" for="No">Nope   >.<</label>
                    <input class="yes" type="checkbox" name="answer" id="Yes" />
                        <label class="yes" for="Yes">Yup   :3</label>
                <div class="answer--yes"></div>
                <div class="answer--no"></div>
                <div class="photo"></div>
                <input class="animate__animated" type="checkbox" name="return" id="return" onClick="window.location.reload();"/>
                    <label class="animate__animated" for="return">Jejeje vale rnr Demoo, te perderás de mucho :P :( Mejor welve >.<</label>
                <input class="animate__animated__yes" type="checkbox" name="returnyes" id="returnyes" onClick="picture();"/>
                    <label class="animate__animated__yes" for="returnyes">Mite el siguiente Wuajajaja</label>
            </div>
        </div>
        <div class="row wrapper">
            <div class="div-p pikachu">
                <div class="div-p head">
                <div class="div-p ears left brown"><div class="div-p ears-inside yellow"></div></div>
                <div class="div-p ears right brown"><div class="div-p ears-inside yellow"></div></div>
                    <div class="div-p face yellow">
                        <span class="span-p eye left brown"></span>
                        <span class="span-p eye right brown"></span>
                        <span class="span-p mouth">w</span>
                        
                        <span class="span-p cachete left"></span>
                        <span class="span-p cachete right"></span>
                    </div>
                </div>
                <div class="div-p body yellow">
                    <div class="div-p heart"></div>
                    <div class="div-p paw left yellow"></div>
                    <div class="div-p paw right yellow"></div>
                </div>
                    
                <div class="div-p leg left yellow-dark"></div>
                <div class="div-p leg right yellow-dark"></div>
                <div class="div-p tail yellow-dark"></div>
            </div>
        </div>

        <div class="frame center-l">
            <div class="glow"></div>
            <div class="half-heart"></div>
            <div class="half-heart reflection"></div>
            <div class="glow" id="two"></div>
            <div class="half-heart" id="two"></div>
            <div class="half-heart reflection" id="two"></div>
        </div>
        <div class="frame center-r">
            <div class="glow"></div>
            <div class="half-heart"></div>
            <div class="half-heart reflection"></div>
            <div class="glow" id="two2"></div>
            <div class="half-heart" id="two2"></div>
            <div class="half-heart reflection" id="two2"></div>
        </div>
    </div>

    <script src="vst.js"></script>
</body>
</html>
